name: diapaler_africa
description: "DIAPALER AFRICA — Plateforme mobile de mentorat et de mise en relation entrepreneuriale au Sénégal."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.4
  firebase_database: ^11.1.7
  shared_preferences: ^2.3.0
  image_picker: ^1.1.0
  geolocator: ^11.0.0
  http: ^1.2.2
  share_plus: ^10.1.4
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # Aucun asset image utilisé pour l'instant.
  # Pour en ajouter : créer le dossier assets/images/ avec au moins un fichier
  # (Git ne suit pas les dossiers vides) puis décommenter la ligne ci-dessous.
  # assets:
  #   - assets/images/
